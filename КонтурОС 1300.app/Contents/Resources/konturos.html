<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КонтурОС</title>
</head>
<body style="margin:0;padding:0;background:#000">
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  КонтурОС v1.0.0 — Desktop OS Simulator for Raspberry Pi 5    ║
  ║  Safari-compatible · Bilingual (RU/EN)                          ║
  ║                                                                  ║
  ║  XCODE PORTING NOTES:                                           ║
  ║  This HTML/JS architecture maps to native macOS as follows:     ║
  ║  ┌─ CSS themes     → NSAppearance + Asset Catalogs              ║
  ║  ├─ Window Manager → NSWindowController + NSWindow              ║
  ║  ├─ Dock           → custom NSView with NSCollectionView        ║
  ║  ├─ Menu Bar       → NSMenu + NSMenuItem (native)               ║
  ║  ├─ File System    → FileManager + sandbox containers           ║
  ║  ├─ Settings       → SwiftUI Settings scene                     ║
  ║  ├─ i18n           → Localizable.strings + String catalogs      ║
  ║  ├─ Apps           → NSViewController subclasses                ║
  ║  └─ AI Monitor     → URLSession + Codable for Anthropic API    ║
  ║                                                                  ║
  ║  Texture fallback: external files in assets/ folder are          ║
  ║  optional; all visuals have inline SVG/CSS gradient fallbacks.  ║
  ║  For Xcode: move to .xcassets image sets.                       ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<style>
/* ══════════════════════════════════════════════════════════════
   1. CSS VARIABLES & THEME
   All colors and fonts centralized for easy Xcode porting.
   In Xcode: these become NSColor constants or Asset Catalog colors.
   ══════════════════════════════════════════════════════════════ */
:root {
  /* Fonts — Xcode: use system fonts via NSFont.systemFont */
  --ui: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --mono: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;

  /* Core palette */
  --bg-deep:    #090c17;
  --bg-panel:   #13172a;
  --bg-titlebar:#1a1e30;
  --bg-card:    #0d1020;
  --bg-hover:   rgba(255,255,255,0.07);
  --bg-input:   rgba(255,255,255,0.07);
  --border:     rgba(255,255,255,0.1);
  --border-subtle: rgba(255,255,255,0.06);

  /* Text */
  --text-primary:   #fff;
  --text-secondary: rgba(255,255,255,0.78);
  --text-tertiary:  rgba(255,255,255,0.48);
  --text-muted:     rgba(255,255,255,0.28);

  /* Accent colors */
  --accent:     #3b82f6;
  --accent-dim: rgba(59,130,246,0.22);
  --green:      #34d399;
  --red:        #f87171;
  --yellow:     #fbbf24;
  --purple:     #a78bfa;
  --cyan:       #22d3ee;
  --orange:     #fb923c;

  /* Dock */
  --dock-bg:    rgba(14,18,32,0.88);

  /* Dimensions */
  --menubar-h:  26px;
  --dock-h:     80px;
  --os-h:       100vh;
}

/* ── Reset ─────────────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #090c17; }

/* ── OS Container ──────────────────────────────────────────── */
#os {
  width: 100%; height: 100vh;
  background: var(--bg-deep);
  font-family: var(--ui);
  position: relative; overflow: hidden;
  border-radius: 0;
}
#wallpaper {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #090c17, #0d1225);
  transition: background 0.4s;
}
/* Colored orbs behind glass — makes refraction visible */
#wallpaper::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 300px 300px at 15% 80%, rgba(59,130,246,0.15), transparent),
    radial-gradient(ellipse 250px 250px at 75% 20%, rgba(168,85,247,0.12), transparent),
    radial-gradient(ellipse 200px 200px at 50% 60%, rgba(52,211,153,0.08), transparent),
    radial-gradient(ellipse 280px 280px at 85% 75%, rgba(248,113,113,0.08), transparent);
  pointer-events: none;
}
.star { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.55); }
/* ── Light Theme ───────────────────────────────────────────── */
#os.light-theme {
  --bg-deep: #e8eaf0;
  --bg-panel: #f0f1f5;
  --bg-titlebar: #dddfe6;
  --bg-card: #ffffff;
  --bg-hover: rgba(0,0,0,0.05);
  --bg-input: rgba(0,0,0,0.04);
  --border: rgba(0,0,0,0.1);
  --border-subtle: rgba(0,0,0,0.06);
  --text-primary: #1a1a2e;
  --text-secondary: rgba(0,0,0,0.75);
  --text-tertiary: rgba(0,0,0,0.45);
  --text-muted: rgba(0,0,0,0.28);
  --dock-bg: rgba(240,241,245,0.75);
}
#os.light-theme #wallpaper { opacity: 0.15; }
#os.light-theme #menubar { background: rgba(232,234,240,0.7) !important; }
#os.light-theme #dockbar { background: rgba(240,241,245,0.65) !important; border-color: rgba(0,0,0,0.08); }
#os.light-theme .win { background: var(--bg-panel); }
#os.light-theme .win-titlebar { background: rgba(221,223,230,0.75) !important; }
#os.light-theme .win-title { color: var(--text-tertiary); }
#os.light-theme .icon-label { color: rgba(0,0,0,0.75); text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
#os.light-theme .dock-icon { background: rgba(0,0,0,0.04) !important; border-color: rgba(0,0,0,0.06); }
#os.light-theme .dock-tip { background: rgba(240,241,245,0.85) !important; color: rgba(0,0,0,0.8); border-color: rgba(0,0,0,0.08); }
#os.light-theme #notif-panel { background: rgba(240,241,245,0.8) !important; }
#os.light-theme .ctx-menu { background: rgba(245,246,250,0.85) !important; }
#os.light-theme .ctx-item { color: var(--text-secondary); }
#os.light-theme .ctx-item:hover { background: var(--accent); color: #fff; }
#os.light-theme .mb-dropdown { background: rgba(240,241,245,0.85) !important; }
#os.light-theme .mdd-item { color: var(--text-secondary); }
#os.light-theme .mb-item { color: var(--text-tertiary); }
#os.light-theme .mb-item:hover, #os.light-theme .mb-item.active { color: var(--text-primary); background: rgba(0,0,0,0.06); }
#os.light-theme .mb-status { color: var(--text-tertiary); }
#os.light-theme .term-body { color: #166534; }
#os.light-theme .term-input { color: #166534; caret-color: #166534; }
#os.light-theme .s-sidebar { background: rgba(0,0,0,0.02); }
#os.light-theme .s-sidebar-item { color: var(--text-tertiary); }
#os.light-theme .s-sidebar-item.active { background: var(--accent-dim); color: var(--text-primary); }
#os.light-theme .dialog-box { background: rgba(240,241,245,0.9) !important; }
#os.light-theme .dialog-input { background: #fff; color: var(--text-primary); }
#os.light-theme .smon-card, #os.light-theme .graph-wrap, #os.light-theme .ai-bubble, #os.light-theme .update-card, #os.light-theme .calc-display { background: rgba(255,255,255,0.7) !important; border-color: rgba(0,0,0,0.06); }
#os.light-theme .browser-bar { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.06); }
#os.light-theme .browser-url { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); color: var(--text-primary); }
#os.light-theme .file-row:hover { background: rgba(0,0,0,0.04); }
#os.light-theme .file-row.selected { background: var(--accent-dim); }
#os.light-theme .files-btn { background: rgba(0,0,0,0.05); color: var(--text-tertiary); }
#os.light-theme .star { display: none; }
#os.light-theme .lr-item:hover, #os.light-theme .lr-item.selected { background: var(--accent-dim); }
#os.light-theme #launcher { background: rgba(230,232,240,0.92); }
#os.light-theme #launcher-input-wrap { background: rgba(0,0,0,0.05) !important; border-color: rgba(0,0,0,0.1); }
#os.light-theme #launcher-input { color: var(--text-primary); }

/* ── Accessibility: High Contrast ──────────────────────────── */
#os.high-contrast { --border: rgba(255,255,255,0.3); --text-secondary: #fff; --text-tertiary: rgba(255,255,255,0.8); --text-muted: rgba(255,255,255,0.55); }
#os.high-contrast .win { border-width: 1.5px !important; }
#os.high-contrast .mb-item, #os.high-contrast .mb-status { color: rgba(255,255,255,0.85); }
#os.high-contrast.light-theme { --border: rgba(0,0,0,0.3); --text-secondary: #000; --text-tertiary: rgba(0,0,0,0.75); --text-muted: rgba(0,0,0,0.5); }

/* ── Accessibility: Reduce Motion ──────────────────────────── */
#os.reduce-motion, #os.reduce-motion * { transition: none !important; animation: none !important; }


/* ── Menu Bar ──────────────────────────────────────────────── */
#menubar {
  position: absolute; top: 0; left: 0; right: 0;
  height: var(--menubar-h);
  background: rgba(9,12,23,0.95);
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; z-index: 500;
}
.mb-left { display: flex; align-items: center; gap: 14px; }
.mb-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.mb-logo { width: 16px; height: 16px; cursor: pointer; }
.mb-item {
  font-size: 12px; color: var(--text-tertiary); cursor: pointer;
  font-weight: 400; letter-spacing: 0.01em; font-family: var(--ui);
  padding: 2px 6px; border-radius: 4px; position: relative;
}
.mb-item:hover, .mb-item.active { color: var(--text-primary); background: rgba(255,255,255,0.08); }
.mb-status {
  font-size: 11px; color: var(--text-tertiary); cursor: pointer;
  display: flex; align-items: center; font-family: var(--ui);
}
.mb-status:hover { color: rgba(255,255,255,0.85); }

/* Menu bar dropdown */
.mb-dropdown {
  position: absolute; top: 22px; left: 0;
  background: var(--bg-titlebar); border: 0.5px solid var(--border);
  border-radius: 8px; padding: 4px; min-width: 180px;
  z-index: 550; display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.mb-dropdown.show { display: block; }
.mdd-item {
  font-size: 12px; color: var(--text-secondary); padding: 6px 12px;
  border-radius: 5px; cursor: pointer; font-family: var(--ui);
  display: flex; justify-content: space-between; align-items: center;
}
.mdd-item:hover { background: var(--accent); color: #fff; }
.mdd-item .shortcut { font-size: 10px; color: var(--text-muted); }
.mdd-item:hover .shortcut { color: rgba(255,255,255,0.6); }
.mdd-sep { height: 0.5px; background: var(--border); margin: 3px 0; }
.mdd-item.disabled { opacity: 0.35; pointer-events: none; }

/* ── Desktop ───────────────────────────────────────────────── */
#desktop {
  position: absolute;
  top: var(--menubar-h); left: 0; right: 0;
  bottom: var(--dock-h);
}
.desk-icon {
  position: absolute; display: flex; flex-direction: column;
  align-items: center; gap: 5px; padding: 8px;
  border-radius: 10px; cursor: pointer; width: 74px;
}
.desk-icon:hover { background: var(--bg-hover); }
.icon-box {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.icon-label {
  font-size: 11px; color: rgba(255,255,255,0.82); text-align: center;
  line-height: 1.3; text-shadow: 0 1px 5px rgba(0,0,0,1);
  font-family: var(--ui); font-weight: 400;
}

/* ── Window System ─────────────────────────────────────────── */
.win {
  position: absolute; background: var(--bg-panel);
  border-radius: 12px; border: 0.5px solid var(--border);
  overflow: hidden; display: flex; flex-direction: column;
  min-width: 280px; min-height: 160px;
  transition: opacity 0.15s, transform 0.15s;
  box-shadow: 0 12px 40px rgba(0,0,0,0.35);
}
.win.opening { opacity: 0; transform: scale(0.93); }
.win.closing { opacity: 0; transform: scale(0.93); }
.win-titlebar {
  height: 36px; background: var(--bg-titlebar);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
  border-bottom: 0.5px solid var(--border-subtle);
  cursor: move; flex-shrink: 0;
}
.win-lights { display: flex; gap: 6px; }
.wl { width: 11px; height: 11px; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
.wl-close { background: #ff5f57; }
.wl-min   { background: #febc2e; }
.wl-max   { background: #28c840; }
.wl:hover { filter: brightness(1.3); }
.win-title {
  font-size: 12px; color: var(--text-muted); margin-left: 6px;
  font-family: var(--ui); font-weight: 400;
}
.win-body {
  flex: 1; overflow: auto; padding: 14px;
}
.win-body::-webkit-scrollbar { width: 4px; }
.win-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Dock ──────────────────────────────────────────────────── */
#dock {
  position: absolute; bottom: 12px; left: 50%;
  transform: translateX(-50%); z-index: 300;
}
#dockbar {
  background: var(--dock-bg);
  border: 0.5px solid rgba(255,255,255,0.11);
  border-radius: 20px; padding: 9px 14px;
  display: flex; align-items: flex-end; gap: 6px;
}
.dock-icon {
  width: 50px; height: 50px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; transition: transform 0.12s ease;
}
.dock-icon:hover { transform: translateY(-12px) scale(1.2); }
.dock-icon.neighbor { transform: translateY(-7px) scale(1.1); }
.dock-icon:hover .dock-tip { opacity: 1; }
.dock-icon.running::after {
  content: ''; position: absolute; bottom: -7px; left: 50%;
  transform: translateX(-50%); width: 4px; height: 4px;
  border-radius: 50%; background: rgba(255,255,255,0.4);
}
.dock-tip {
  position: absolute; bottom: calc(100% + 10px); left: 50%;
  transform: translateX(-50%); background: var(--bg-titlebar);
  color: rgba(255,255,255,0.88); font-size: 11px; font-family: var(--ui);
  padding: 4px 10px; border-radius: 6px; pointer-events: none;
  opacity: 0; white-space: nowrap; border: 0.5px solid var(--border);
}
.dock-div {
  width: 0.5px; height: 38px; background: var(--border);
  margin: 0 2px; align-self: center;
}

/* ── Launcher ──────────────────────────────────────────────── */
#launcher {
  position: absolute; inset: 0; z-index: 400;
  background: rgba(6,9,18,0.92); display: none;
  align-items: flex-start; justify-content: center; padding-top: 90px;
}
#launcher.show { display: flex; }
#launcher-box { width: 520px; }
#launcher-input-wrap {
  background: var(--bg-input);
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 14px; display: flex; align-items: center;
  padding: 0 16px; gap: 10px;
}
#launcher-input {
  flex: 1; background: none; border: none; outline: none;
  color: #fff; font-size: 17px; font-family: var(--ui);
  font-weight: 300; padding: 13px 0;
}
#launcher-input::placeholder { color: rgba(255,255,255,0.2); }
#launcher-results { margin-top: 10px; display: flex; flex-direction: column; gap: 1px; }
.lr-item {
  display: flex; align-items: center; gap: 12px; padding: 9px 12px;
  border-radius: 10px; cursor: pointer;
}
.lr-item:hover, .lr-item.selected { background: var(--accent-dim); }
.lr-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.lr-name { font-size: 13px; color: rgba(255,255,255,0.88); font-family: var(--ui); font-weight: 400; }
.lr-sub { font-size: 11px; color: var(--text-muted); margin-left: auto; font-family: var(--ui); }

/* ── Notification Panel ────────────────────────────────────── */
#notif-panel {
  position: absolute; top: 30px; right: 10px; z-index: 450;
  background: var(--bg-titlebar); border: 0.5px solid var(--border);
  border-radius: 14px; padding: 14px; width: 280px;
  display: none; flex-direction: column; gap: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
#notif-panel.show { display: flex; }
.notif-item { display: flex; gap: 9px; align-items: flex-start; }
.notif-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.notif-text { font-size: 12px; color: rgba(255,255,255,0.7); line-height: 1.5; font-family: var(--ui); }
.notif-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-family: var(--ui); }

/* ── Context Menu ──────────────────────────────────────────── */
.ctx-menu {
  position: absolute; background: #1c2030;
  border: 0.5px solid var(--border); border-radius: 10px;
  padding: 4px; z-index: 600; min-width: 180px; display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.ctx-menu.show { display: block; }
.ctx-item {
  font-size: 13px; color: var(--text-secondary); padding: 7px 12px;
  border-radius: 7px; cursor: pointer; font-family: var(--ui);
}
.ctx-item:hover { background: var(--accent); color: #fff; }
.ctx-sep { height: 0.5px; background: rgba(255,255,255,0.08); margin: 3px 0; }

/* ══════════════════════════════════════════════════════════════
   APP-SPECIFIC STYLES
   ══════════════════════════════════════════════════════════════ */

/* ── Settings ──────────────────────────────────────────────── */
.s-sidebar {
  display: flex; flex-direction: column; gap: 1px;
  width: 140px; border-right: 0.5px solid var(--border-subtle);
  padding: 8px; flex-shrink: 0; overflow-y: auto;
}
.s-sidebar-item {
  font-size: 12px; color: var(--text-tertiary); padding: 7px 10px;
  border-radius: 8px; cursor: pointer; font-family: var(--ui);
  display: flex; align-items: center; gap: 8px;
}
.s-sidebar-item:hover { background: var(--bg-hover); color: var(--text-secondary); }
.s-sidebar-item.active { background: var(--accent-dim); color: var(--text-primary); }
.s-content { flex: 1; padding: 14px; overflow-y: auto; }
.s-section {
  font-size: 10px; color: var(--text-muted); padding: 10px 0 4px;
  text-transform: uppercase; letter-spacing: .07em;
  font-family: var(--ui); font-weight: 600;
}
.s-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; cursor: pointer; border-radius: 8px;
}
.s-row:hover { background: rgba(255,255,255,0.03); }
.s-label { font-size: 13px; color: var(--text-secondary); font-family: var(--ui); }
.s-value { font-size: 12px; color: var(--text-muted); font-family: var(--ui); }
.s-toggle {
  width: 34px; height: 20px; border-radius: 10px;
  position: relative; cursor: pointer; flex-shrink: 0;
  transition: background 0.18s;
}
.s-toggle.on { background: var(--accent); }
.s-toggle.off { background: rgba(255,255,255,0.14); }
.s-knob {
  position: absolute; top: 3px; width: 14px; height: 14px;
  border-radius: 50%; background: #fff; transition: left 0.18s;
}
.s-toggle.on .s-knob { left: 17px; }
.s-toggle.off .s-knob { left: 3px; }
.s-slider-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.s-slider-row input[type=range] {
  flex: 1; -webkit-appearance: none; height: 4px;
  border-radius: 2px; background: rgba(255,255,255,0.12); outline: none;
}
.s-slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}
.s-slider-val {
  font-size: 11px; color: var(--text-muted); min-width: 32px;
  text-align: right; font-family: var(--ui);
}

/* Settings: update card */
.update-card {
  background: var(--bg-card); border-radius: 10px; padding: 16px;
  margin-top: 8px;
}
.update-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 8px 18px; font-size: 13px;
  font-family: var(--ui); cursor: pointer; margin-top: 10px;
}
.update-btn:hover { filter: brightness(1.15); }
.update-btn:active { opacity: 0.8; }
.update-btn.checking { background: rgba(255,255,255,0.1); color: var(--text-tertiary); }
.update-progress {
  height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08);
  margin-top: 10px; overflow: hidden;
}
.update-progress-fill {
  height: 100%; border-radius: 2px; background: var(--accent);
  transition: width 0.3s; width: 0%;
}
/* Accent color picker */
.accent-grid {
  display: flex; gap: 8px; padding: 6px 0; flex-wrap: wrap;
}
.accent-swatch {
  width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color 0.15s;
}
.accent-swatch.active { border-color: #fff; }
.accent-swatch:hover { transform: scale(1.15); }

/* Storage bars */
.storage-bar {
  height: 20px; border-radius: 10px; background: rgba(255,255,255,0.06);
  overflow: hidden; display: flex; margin: 6px 0;
}
.storage-seg { height: 100%; transition: width 0.4s; }

/* ── Terminal ──────────────────────────────────────────────── */
.term-body {
  font-family: var(--mono); font-size: 12px; line-height: 1.8;
  color: #4ade80; white-space: pre-wrap; word-break: break-all;
  min-height: 160px;
}
.term-prompt { color: var(--text-muted); font-family: var(--mono); }
.term-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 12px; color: #4ade80; caret-color: #4ade80;
}

/* SVG distortion filter for glass refraction */

/* Specular shimmer line on menubar */
#menubar::after {

    transparent 0%,

    rgba(255,255,255,0.25) 55%,

#dockbar {

/** Get translation for current language */
function t(key) { return LANG[CFG.lang]?.[key] || LANG.ru[key] || key; }

/** Apply language to all [data-i18n] elements */
function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.getElementById('launcher-input').placeholder = t('search_placeholder');
  document.getElementById('mb-lang').textContent = CFG.lang.toUpperCase();
  document.getElementById('mb-appname').textContent = t('os_name');
  buildMenus();
  buildDock();
  buildDesktopIcons();
  buildNotifPanel();
  buildCtxMenu();
  // Refresh open settings window if visible
  if (openWindows['settings']) {
    const wc = document.getElementById('wc_settings');
    if (wc) renderSettingsPage(wc, currentSettingsPage);
  }
}

function cycleLang() {
  CFG.lang = CFG.lang === 'ru' ? 'en' : 'ru';
  applyLang();
}

// FS helpers
function fsGet(path) { return FS[path] || null; }
function fsIsDir(path) { return FS[path]?.type === 'dir'; }
function fsParent(path) {
  if (path === '/') return '/';
  const parts = path.split('/').filter(Boolean);
  parts.pop();
  return '/' + parts.join('/') || '/';
}
function fsName(path) { return path.split('/').filter(Boolean).pop() || '/'; }

function fsCreateDir(parentPath, name) {
  const p = (parentPath === '/' ? '' : parentPath) + '/' + name;
  if (FS[p]) return false;
  FS[p] = { type: 'dir', children: [], modified: new Date().toISOString().slice(0,16) };
  FS[parentPath].children.push(name);
  return true;
}

function fsCreateFile(parentPath, name, content) {
  const p = (parentPath === '/' ? '' : parentPath) + '/' + name;
  if (FS[p]) return false;
  FS[p] = { type: 'file', size: '0 KB', content: content || '', modified: new Date().toISOString().slice(0,16) };
  FS[parentPath].children.push(name);
  return true;
}

function fsDelete(path) {
  if (path === '/') return false;
  const parent = fsParent(path);
  const name = fsName(path);
  const pNode = FS[parent];
  if (!pNode) return false;
  pNode.children = pNode.children.filter(c => c !== name);
  // Recursively delete children
  if (FS[path]?.type === 'dir') {
    FS[path].children.forEach(ch => fsDelete((path === '/' ? '' : path) + '/' + ch));
  }
  delete FS[path];
  return true;
}

function fsRename(path, newName) {
  if (path === '/') return false;
  const parent = fsParent(path);
  const oldName = fsName(path);
  const newPath = (parent === '/' ? '' : parent) + '/' + newName;
  if (FS[newPath]) return false;
  FS[newPath] = FS[path];
  delete FS[path];
  const pNode = FS[parent];
  const idx = pNode.children.indexOf(oldName);
  if (idx !== -1) pNode.children[idx] = newName;
  // If dir, update all child paths
  if (FS[newPath].type === 'dir') {
    const updateChildren = (oldP, newP) => {
      FS[newP].children.forEach(ch => {
        const oldCh = oldP + '/' + ch;
        const newCh = newP + '/' + ch;
        if (FS[oldCh]) {
          FS[newCh] = FS[oldCh];
          delete FS[oldCh];
          if (FS[newCh].type === 'dir') updateChildren(oldCh, newCh);
        }
      });
    };
    updateChildren(path, newPath);
  }
  return true;
}

function fsSave(path, content) {
  if (FS[path]) {
    FS[path].content = content;
    FS[path].size = Math.ceil(new Blob([content]).size / 1024) + ' KB';
    FS[path].modified = new Date().toISOString().slice(0,16);
    return true;
  }
  return false;
}

function showDialog({ title, text, input, inputValue, buttons }) {
  return new Promise(resolve => {
    const container = document.getElementById('dialog-container');
    const html = `<div class="dialog-overlay" onclick="if(event.target===this)closeDialog(null)">
      <div class="dialog-box">
        <div class="dialog-title">${title}</div>
        ${text ? `<div class="dialog-text">${text}</div>` : ''}
        ${input ? `<input class="dialog-input" id="dialog-inp" value="${inputValue || ''}" placeholder="${title}">` : ''}
        <div class="dialog-btns">${buttons.map((b, i) =>
          `<button class="dialog-btn ${b.cls || ''}" onclick="closeDialog(${i})">${b.label}</button>`
        ).join('')}</div>
      </div>
    </div>`;
    container.innerHTML = html;
    window._dialogResolve = resolve;
    window._dialogButtons = buttons;
    if (input) {
      const inp = document.getElementById('dialog-inp');
      setTimeout(() => { inp.focus(); inp.select(); }, 50);
      inp.onkeydown = e => { if (e.key === 'Enter') closeDialog(buttons.length - 1); };
    }
  });
}

function closeDialog(btnIndex) {
  const container = document.getElementById('dialog-container');
  const inp = document.getElementById('dialog-inp');
  const value = inp ? inp.value : null;
  container.innerHTML = '';
  if (window._dialogResolve) {
    window._dialogResolve(btnIndex !== null ? { btn: btnIndex, value } : null);
    window._dialogResolve = null;
  }
}

/* ─── 10. WINDOW MANAGER ─────────────────────────────────── */
const WIN_SIZES = {
  settings: [520, 420], calc: [265, 355], clock: [300, 295],
  sysmon: [420, 400], files: [480, 370], browser: [640, 440],
  term: [480, 310], editor: [460, 360],
};

function openWin(id, opts) {
  if (openWindows[id]) { openWindows[id].style.zIndex = ++windowZIndex; return; }
  const apps = getApps();
  const app = apps.find(x => x.id === id);
  if (!app) return;
  const win = document.createElement('div');
  win.className = 'win opening';
  const n = Object.keys(openWindows).length;
  const [ww, wh] = WIN_SIZES[id] || [420, 320];
  win.style.cssText = `left:${60 + n * 22}px;top:${35 + n * 16}px;width:${ww}px;height:${wh}px;z-index:${++windowZIndex}`;
  const bodyStyle = id === 'settings' ? 'padding:0;display:flex;' : id === 'browser' ? 'display:flex;flex-direction:column;' : '';
  win.innerHTML = `<div class="win-titlebar">
    <div class="win-lights">
      <div class="wl wl-close" onclick="closeWin('${id}')"></div>
      <div class="wl wl-min" onclick="minWin('${id}')"></div>
      <div class="wl wl-max" onclick="maxWin('${id}')"></div>
    </div>
    <span class="win-title">${t(app.nameKey)}</span>
  </div>
  <div class="win-body" id="wc_${id}" style="${bodyStyle}"></div>`;
  document.getElementById('os').appendChild(win);
  openWindows[id] = win;
  enableDrag(win, win.querySelector('.win-titlebar'));
  requestAnimationFrame(() => requestAnimationFrame(() => win.classList.remove('opening')));
  // Render content
  renderWinContent(id, opts);
  // Post-open hooks
  if (id === 'term') setTimeout(() => { const i = document.getElementById('term-input'); if (i) i.focus(); }, 80);
  if (id === 'clock') tickClock();
  if (id === 'sysmon') {
    renderSM(fakeSys()); win._t = setInterval(() => renderSM(fakeSys()), 1800);
    setTimeout(() => fetchAI(fakeSys()), 400);
    win._ai = setInterval(() => fetchAI(fakeSys()), 30000);
  }
  updateDockDots();
  document.getElementById('mb-appname').textContent = t(app.nameKey);
}

function closeWin(id) {
  if (!openWindows[id]) return;
  openWindows[id].classList.add('closing');
  setTimeout(() => {
    if (openWindows[id]) {
      if (openWindows[id]._t) clearInterval(openWindows[id]._t);
      if (openWindows[id]._ai) clearInterval(openWindows[id]._ai);
      openWindows[id].remove(); delete openWindows[id];
    }
    updateDockDots();
    document.getElementById('mb-appname').textContent = t('os_name');
  }, 140);
}
function minWin(id) { if (openWindows[id]) openWindows[id].style.display = openWindows[id].style.display === 'none' ? 'flex' : 'none'; }
function maxWin(id) {
  const w = openWindows[id]; if (!w) return;
  if (w._max) { Object.assign(w.style, { left: w._mx, top: w._my, width: w._mw, height: w._mh }); delete w._max; }
  else { w._mx = w.style.left; w._my = w.style.top; w._mw = w.style.width; w._mh = w.style.height;
    Object.assign(w.style, { left: '0px', top: '0px', width: '100%', height: (document.getElementById('os').offsetHeight - 26 - 80) + 'px' }); w._max = 1; }
}
function enableDrag(el, handle) {
  let ox, oy;
  handle.onmousedown = e => {
    if (e.target.classList.contains('wl')) return;
    e.preventDefault(); el.style.zIndex = ++windowZIndex;
    ox = e.clientX - el.offsetLeft; oy = e.clientY - el.offsetTop;
    document.onmousemove = e2 => { el.style.left = Math.max(0, e2.clientX - ox) + 'px'; el.style.top = Math.max(26, Math.min(e2.clientY - oy, document.getElementById('os').offsetHeight - 85)) + 'px'; };
    document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; };
  };
}

function filesHTML(path) {
  const node = FS[path] || FS['/'];
  const parts = path.split('/').filter(Boolean);
  const bc = `<div class="file-path">
    <span class="fp-btn" onclick="fsNav('/')">~</span>
    ${parts.map((p, i) => `<span style="opacity:.3">›</span><span class="fp-btn" onclick="fsNav('/${parts.slice(0, i + 1).join('/')}')">${p}</span>`).join('')}
  </div>`;
  const toolbar = `<div class="files-toolbar">
    ${path !== '/' ? `<button class="files-btn" onclick="fsNav('${fsParent(path)}')" title="${t('back')}">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>` : ''}
    <button class="files-btn" onclick="filesNewFolder()">+ ${t('files_new_folder')}</button>
    <button class="files-btn" onclick="filesNewFile()">+ ${t('files_new_file')}</button>
    ${selectedFile ? `<button class="files-btn" onclick="filesRename()" style="margin-left:auto">${t('files_rename')}</button>
    <button class="files-btn" onclick="filesDelete()" style="color:var(--red)">${t('files_delete')}</button>` : ''}
  </div>`;

  if (node.type === 'file') {
    return bc + `<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:13px">
      ${fsName(path)}<br><span style="font-size:11px">${node.size}</span>
      ${node.content ? `<br><button class="files-btn" style="margin-top:12px" onclick="openFileEditor('${path}')">${t('open')}</button>` : ''}
    </div>`;
  }

  if (node.children.length === 0) {
    return bc + toolbar + `<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:12px">${t('empty_folder')}</div>`;
  }

  // Sort: dirs first, then files
  const sorted = [...node.children].sort((a, b) => {
    const ap = (path === '/' ? '' : path) + '/' + a;
    const bp = (path === '/' ? '' : path) + '/' + b;
    const aDir = fsIsDir(ap) ? 0 : 1;
    const bDir = fsIsDir(bp) ? 0 : 1;
    return aDir - bDir || a.localeCompare(b);
  });

  const rows = sorted.map(name => {
    const cp = (path === '/' ? '' : path) + '/' + name;
    const child = FS[cp] || { type: 'file', size: '--' };
    const isDir = child.type === 'dir';
    const sel = selectedFile === cp ? ' selected' : '';
    const icon = isDir

      : getFileIcon(name);

function fsPasteVirtual() {
  if (!fsClipboard.path || !FS[fsClipboard.path]) return;
  const name = fsName(fsClipboard.path);
  const dest = (fsCwd === '/' ? '' : fsCwd) + '/' + name;
  if (fsClipboard.op === 'copy') {
    const src = FS[fsClipboard.path];

  openWin('editor', { path, content: node.content });
}

function termKey(e) {
  if (e.key !== 'Enter') return;
  const inp = document.getElementById('term-input');
  const raw = inp.value.trim(); inp.value = '';
  if (!raw) return;
  const prompt = `<span class="term-prompt">kontur@pi5:${termCwd}$</span> ${escapeHtml(raw)}`;
  const parts = raw.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1).join(' ');
  let out = '';

  switch (cmd) {
    case 'help': out = t('term_help'); break;
    case 'clear': termLines = []; { const o = document.getElementById('term-output'); if (o) o.innerHTML = ''; } return;
    case 'echo': out = escapeHtml(args); break;
    case 'date': out = new Date().toLocaleString(CFG.lang === 'ru' ? 'ru-RU' : 'en-US'); break;
    case 'uname': out = 'Linux kontur-pi5 6.6.0-kontur #1 SMP PREEMPT aarch64 GNU/Linux'; break;
    case 'kontur': out = 'КонтурОС v1.0.0 — Safari-compatible build'; break;
    case 'uptime': { const u = Math.floor(performance.now() / 1000); out = `up ${Math.floor(u / 60)}m ${u % 60}s, load: 0.${Math.floor(Math.random() * 5)}${Math.floor(Math.random() * 9)}`; break; }
    case 'whoami': out = 'kontur-user'; break;
    case 'pwd': out = termCwd; break;
    case 'ls': {
      const target = args ? resolvePath(termCwd, args) : termCwd;
      const node = FS[target];
      if (!node) { out = `<span style="color:var(--red)">ls: ${args}: нет такого файла</span>`; }
      else if (node.type === 'dir') { out = node.children.map(c => fsIsDir((target === '/' ? '' : target) + '/' + c) ? `<span style="color:#60a5fa">${c}/</span>` : c).join('  '); }
      else { out = fsName(target); }
      break;
    }
    case 'cd': {
      if (!args || args === '~') { termCwd = '/'; out = ''; break; }
      const target = resolvePath(termCwd, args);
      if (FS[target]?.type === 'dir') { termCwd = target; out = ''; }
      else { out = `<span style="color:var(--red)">cd: ${args}: нет такой папки</span>`; }
      break;
    }
    case 'cat': {
      if (!args) { out = 'cat: missing file'; break; }
      const target = resolvePath(termCwd, args);
      const node = FS[target];
      if (!node) { out = `<span style="color:var(--red)">cat: ${args}: нет такого файла</span>`; }
      else if (node.type === 'dir') { out = `<span style="color:var(--red)">cat: ${args}: это папка</span>`; }
      else { out = escapeHtml(node.content || '(empty)'); }
      break;
    }
    case 'mkdir': {
      if (!args) { out = 'mkdir: missing name'; break; }
      const success = fsCreateDir(termCwd, args);
      out = success ? '' : `<span style="color:var(--red)">mkdir: ${args}: уже существует</span>`;
      break;
    }
    case 'touch': {
      if (!args) { out = 'touch: missing name'; break; }
      const success = fsCreateFile(termCwd, args, '');
      out = success ? '' : `<span style="color:var(--red)">touch: ${args}: уже существует</span>`;
      break;
    }
    case 'rm': {
      if (!args) { out = 'rm: missing name'; break; }
      const target = resolvePath(termCwd, args);
      const success = fsDelete(target);
      out = success ? '' : `<span style="color:var(--red)">rm: ${args}: не найден</span>`;
      break;
    }
    case 'sysinfo': out = `Platform:  ${navigator.platform || 'unknown'}\nCores:     ${navigator.hardwareConcurrency || 4} logical\nMemory:    ${navigator.deviceMemory || '?'} GB\nUA:        ${navigator.userAgent.substring(0, 55)}...`; break;
    case 'neofetch': out = neofetchOutput(); break;
    default: out = `<span style="color:var(--red)">${t('term_not_found')} ${escapeHtml(raw)}</span>`;
  }
  termLines.push(prompt);
  if (out) termLines.push(out);
  const tout = document.getElementById('term-output');
  if (tout) { tout.innerHTML = termLines.join('\n'); tout.parentElement.scrollTop = 99999; }
  // Update prompt
  const promptEl = tout?.parentElement?.querySelector('.term-prompt');
  if (promptEl) promptEl.textContent = `kontur@pi5:${termCwd}$`;
}

function resolvePath(cwd, rel) {
  if (rel.startsWith('/')) return normalizePath(rel);
  if (rel === '..') return fsParent(cwd);
  if (rel.startsWith('../')) return resolvePath(fsParent(cwd), rel.slice(3));
  return normalizePath((cwd === '/' ? '' : cwd) + '/' + rel);
}
function normalizePath(p) {
  const parts = p.split('/').filter(Boolean);
  const result = [];
  parts.forEach(part => { if (part === '..') result.pop(); else if (part !== '.') result.push(part); });
  return '/' + result.join('/') || '/';
}

let calcSt = { expr: '', result: '0', prev: '' };
function cP(v) {
  if (v === 'C') { calcSt = { expr: '', result: '0', prev: '' }; cR(); return; }
  if (v === '=') { try { const r = Function('"use strict";return(' + calcSt.expr + ')')(); calcSt.prev = calcSt.expr + ' ='; calcSt.result = String(Math.round(r * 1e10) / 1e10); calcSt.expr = ''; } catch { calcSt.result = t('error'); calcSt.expr = ''; } cR(); return; }
  if (v === 'back') { calcSt.expr = calcSt.expr.slice(0, -1); cR(); return; }
  if (v === 'pm') { if (calcSt.expr) calcSt.expr = '(-(' + calcSt.expr + '))'; cR(); return; }
  if (v === 'pct') { calcSt.expr += '/100'; cR(); return; }
  calcSt.expr += v === 'x' ? '*' : v === 'div' ? '/' : v === 'min' ? '-' : v;
  calcSt.result = calcSt.expr; cR();
}
function cR() { const d = document.getElementById('calc-display'); if (!d) return; d.querySelector('.calc-main').textContent = calcSt.result || '0'; d.querySelector('.calc-sub').textContent = calcSt.prev; }

function calcHTML() {

    row.map((v, ci) => {
      const labels = { div: '÷', x: '×', min: '−', pm: '±', pct: '%' };
      const disp = labels[v] || v;
      const isOp = ['div', 'x', 'min', '+', '='].includes(v);
      const isClear = v === 'C';
      const bg = isOp ? '#1e3a6e' : isClear ? '#2a1010' : 'var(--bg-titlebar)';
      const clr = isOp ? '#60a5fa' : isClear ? 'var(--red)' : 'rgba(255,255,255,.85)';
      const sp = (ri === 4 && ci === 0) ? 'grid-column:span 2' : '';
      return `<button class="calc-btn" style="background:${bg};color:${clr};${sp}" onclick="cP('${v}')">${disp}</button>`;
    }).join('')
  ).join('')}</div>`;
}

/* ─── 17.5 NATIVE BRIDGE (Swift ↔ JS) ───────────────────── */
/*
 * When running inside WKWebView, Swift injects window._nativeData
 * which is kept up-to-date every second.
 * When running standalone in browser, we fall back to fake data.
 */
const isNative = () => !!(window.webkit?.messageHandlers?.konturBridge);

/** Request data from Swift */
function nativeSend(action, data) {
  if (isNative()) {
    window.webkit.messageHandlers.konturBridge.postMessage({ action, data: data || {} });
  }
}

/** Called by Swift to push system metrics */
window._nativeData = null;
window._nativeSysInfo = null;
window._nativeBattery = null;
window._nativeFS = null;

/** Swift calls this to update system metrics */
window.updateSystemData = function(data) { window._nativeData = data; };
window.updateBattery = function(data) { window._nativeBattery = data; updateBatteryUI(data); };
window.updateSysInfo = function(data) { window._nativeSysInfo = data; };

/** Update battery indicator in menu bar */
function updateBatteryUI(b) {
  if (!b) return;
  const fill = document.getElementById('mb-battery-fill');
  const pctEl = document.getElementById('mb-battery-pct');
  if (fill) {
    const w = Math.max(1, Math.round(b.level / 100 * 11));
    fill.setAttribute('width', w);
    const color = b.charging ? '#4ade80' : b.level < 20 ? '#f87171' : b.level < 50 ? '#fbbf24' : 'rgba(255,255,255,0.35)';
    fill.setAttribute('fill', color);
  }
  if (pctEl) pctEl.textContent = b.level + '%';
}

/** Called by Swift when native file listing returns */
window.nativeFileList = null;
window.updateNativeFiles = function(path, entries) {
  window.nativeFileList = { path, entries };
  // If files window is open, refresh
  if (fsCwd === path && openWindows['files']) refreshFiles();

/** Called by Swift to push settings values */

  if (data.volume !== undefined) CFG.vol = Math.round(data.volume);
  if (data.brightness !== undefined) CFG.bright = Math.round(data.brightness * 100);
  if (data.darkMode !== undefined) CFG.darkMode = data.darkMode;

function nativeSetBrightness(v) { nativeSend('setBrightness', { value: v / 100 }); }
function nativeSetDarkMode(v) { nativeSend('setDarkMode', { value: v }); }

      uptime: Math.round(d.uptime || performance.now() / 1000),

      model: d.model || '',
    };
  }
  // Fallback for standalone browser
  return { cpu: Math.round(8 + Math.random() * 45), mem: Math.round(210 + Math.random() * 120), memTotal: Math.round((navigator.deviceMemory || 8) * 1024), temp: Math.round(42 + Math.random() * 25), cores: navigator.hardwareConcurrency || 4, platform: navigator.platform || 'macOS', uptime: Math.floor(performance.now() / 1000) };
}

function renderSM(data) {
  cpuH.push(data.cpu); memH.push(Math.round(data.mem / data.memTotal * 100));
  if (cpuH.length > 28) cpuH.shift(); if (memH.length > 28) memH.shift();
  const upd = (id, val, pct, color, sub) => { const el = document.getElementById(id); if (!el) return; el.querySelector('.smon-val').textContent = val; el.querySelector('.smon-sub').textContent = sub; const f = el.querySelector('.smon-bar-fill'); if (f) { f.style.width = pct + '%'; f.style.background = color; } };
  upd('scpu', data.cpu + '%', data.cpu, data.cpu > 70 ? 'var(--red)' : data.cpu > 40 ? 'var(--yellow)' : 'var(--green)', data.cores + ' ' + t('cores_label'));
  upd('smem', data.mem + ' MB', Math.round(data.mem / data.memTotal * 100), 'var(--accent)', t('of_total') + ' ' + data.memTotal + ' MB');
  upd('stemp', data.temp + '°C', Math.min(100, data.temp * 1.3), data.temp > 70 ? 'var(--red)' : data.temp > 55 ? 'var(--yellow)' : 'var(--purple)', t('normal_temp'));
  const u = data.uptime; upd('supt', Math.floor(u / 3600) + 'h ' + Math.floor((u % 3600) / 60) + 'm', 30, 'var(--yellow)', data.platform);
  drawGraph('gcpu', cpuH, '#34d399'); drawGraph('gmem', memH, '#3b82f6');
}

function drawGraph(id, data, color) {
  const c = document.getElementById(id); if (!c || data.length < 2) return;
  c.width = c.parentElement.offsetWidth - 24 || 300; c.height = 44;
  const ctx = c.getContext('2d'); ctx.clearRect(0, 0, c.width, c.height);
  const w = c.width / (data.length - 1);
  ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.beginPath();
  data.forEach((v, i) => { const x = i * w, y = c.height - (v / 100) * c.height; i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.stroke();
  ctx.globalAlpha = 0.1; ctx.fillStyle = color; ctx.lineTo(c.width, c.height); ctx.lineTo(0, c.height); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
}

async function fetchAI(data) {

    const j = await r.json();
    el.textContent = j.content?.[0]?.text || t('ai_unavailable');
  } catch { el.textContent = t('ai_unavailable'); }
}

function toggleCfg(key, row) {
