/** Apply a single setting change visually */
function applySetting(key) {
  const os = document.getElementById('os');
  switch (key) {
    case 'darkMode':
      if (CFG.darkMode) os.classList.remove('light-theme');
      else os.classList.add('light-theme');
      break;
    case 'nightShift':
      os.style.filter = CFG.nightShift
        ? `brightness(${CFG.bright/100}) sepia(0.3) saturate(1.2)`
        : `brightness(${CFG.bright/100})`;
      break;
    case 'wifi':
      document.getElementById('mb-wifi').style.opacity = CFG.wifi ? '1' : '0.25';
      // Re-render network page if open
      if (currentSettingsPage === 'network') {
        const wc = document.getElementById('settings-content');
        if (wc) renderSettingsPage(wc, 'network');
      }
      break;
    case 'bluetooth':
      if (currentSettingsPage === 'network') {
        const wc = document.getElementById('settings-content');
        if (wc) renderSettingsPage(wc, 'network');
      }
      break;
    case 'notif':
      document.getElementById('mb-notif-btn').style.opacity = CFG.notif ? '1' : '0.25';
      break;
    case 'dnd':
      document.getElementById('mb-notif-btn').style.color = CFG.dnd ? 'var(--purple)' : '';
      break;
    case 'anim':
      os.style.transition = CFG.anim ? '' : 'none';
      document.querySelectorAll('.win, .dock-icon, .s-toggle, .s-knob, .smon-bar-fill').forEach(el => {
        el.style.transition = CFG.anim ? '' : 'none';
      });
      break;
    case 'transparency':
      document.querySelectorAll('#menubar,#dockbar,.win-titlebar,#notif-panel,.ctx-menu,.mb-dropdown,.dialog-box,.dock-tip').forEach(el => {
        el.style.backdropFilter = CFG.transparency ? '' : 'none';
        el.style.webkitBackdropFilter = CFG.transparency ? '' : 'none';
      });
      break;
    case 'dockAutohide':
      const dock = document.getElementById('dock');
      if (CFG.dockAutohide) {
        dock.style.opacity = '0';
        dock.style.transform = 'translateX(-50%) translateY(20px)';
        dock.style.transition = 'opacity 0.3s, transform 0.3s';
        dock.onmouseenter = () => { dock.style.opacity = '1'; dock.style.transform = 'translateX(-50%)'; };
        dock.onmouseleave = () => { dock.style.opacity = '0'; dock.style.transform = 'translateX(-50%) translateY(20px)'; };
      } else {
        dock.style.opacity = '1';
        dock.style.transform = 'translateX(-50%)';
        dock.onmouseenter = null;
        dock.onmouseleave = null;
      }
      break;
    case 'highContrast':
      os.classList.toggle('high-contrast', CFG.highContrast);
      break;
    case 'reduceMotion':
      os.classList.toggle('reduce-motion', CFG.reduceMotion);
      break;
    case 'largerCursor':
      os.style.cursor = CFG.largerCursor ? 'url("data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'32\' height=\'32\'><circle cx=\'16\' cy=\'16\' r=\'14\' fill=\'white\' stroke=\'black\' stroke-width=\'2\'/></svg>") 16 16, auto' : '';
      break;
  }
}

/** Apply brightness/volume sliders */
function applySlider(key, value) {
  CFG[key] = value;
  const os = document.getElementById('os');
  switch (key) {
    case 'bright':
      const filter = CFG.nightShift
        ? `brightness(${value/100}) sepia(0.3) saturate(1.2)`
        : `brightness(${value/100})`;
      os.style.filter = filter;
      break;
    case 'fontSize':
      os.style.fontSize = value + 'px';
      break;
    case 'dockSize':
      document.querySelectorAll('.dock-icon').forEach(d => {
        d.style.width = value + 'px';
        d.style.height = value + 'px';
      });
      break;
  }
}

function applyTheme() { applySetting('darkMode'); }

function setAccentColor(color) {
  CFG.accentColor = color;
  document.documentElement.style.setProperty('--accent', color);
  document.querySelectorAll('.accent-swatch').forEach(s => s.classList.toggle('active', s.style.background === color));
}

function setWallpaper(id, bg) {
  CFG.wallpaper = id;
  CFG.wallpaperCustom = null;
  CFG.wallpaperCustomName = null;
  document.getElementById('wallpaper').style.background = bg || id;
  document.getElementById('wallpaper').style.backgroundSize = '';
  if (currentSettingsPage === 'appearance') {
    const wc = document.getElementById('settings-content');
    if (wc) renderSettingsPage(wc, 'appearance');
  }
}

function handleWallpaperFile(input) {
  const file = input.files?.[0];
  if (!file || !file.type.startsWith('image/')) return;
  const url = URL.createObjectURL(file);
  CFG.wallpaper = 'custom';
  CFG.wallpaperCustom = url;
  CFG.wallpaperCustomName = file.name;
  const wp = document.getElementById('wallpaper');
  wp.style.background = `url('${url}') center/cover no-repeat`;
  // Refresh settings page to show preview
  if (currentSettingsPage === 'appearance') {
    const wc = document.getElementById('settings-content');
    if (wc) renderSettingsPage(wc, 'appearance');
  }
  // Reset input so same file can be re-selected
  input.value = '';
}

function clearCustomWallpaper() {
  CFG.wallpaperCustom = null;
  CFG.wallpaperCustomName = null;
  setWallpaper('default-dark', 'linear-gradient(135deg,#090c17,#0d1225)');
}

/* ── Wallpaper Picker Window ─────────────────────────────── */
let wpPickerCwd = '/';
const IMG_EXTS = ['png','jpg','jpeg','gif','webp','bmp','svg','tiff'];

function openWallpaperPicker() {
  wpPickerCwd = (window.IS_NATIVE && window.nativeBridge) ? '~/Pictures' : '/Pictures';
  const id = 'wppicker';
  if (openWindows[id]) { openWindows[id].style.zIndex = ++windowZIndex; return; }

  const win = document.createElement('div');
  win.className = 'win opening';
  win.style.cssText = `left:80px;top:40px;width:460px;height:380px;z-index:${++windowZIndex}`;
  win.innerHTML = `<div class="win-titlebar">
    <div class="win-lights"><div class="wl wl-close" onclick="closeWin('${id}')"></div><div class="wl wl-min"></div><div class="wl wl-max"></div></div>
    <span class="win-title">${t('choose_from_files')}</span>
  </div>
  <div class="win-body" id="wc_${id}" style="display:flex;flex-direction:column;gap:8px"></div>`;
  document.getElementById('os').appendChild(win);
  openWindows[id] = win;
  enableDrag(win, win.querySelector('.win-titlebar'));
  requestAnimationFrame(() => requestAnimationFrame(() => win.classList.remove('opening')));
  renderWpPicker();
}

function renderWpPicker() {
  const wc = document.getElementById('wc_wppicker');
  if (!wc) return;

  // Check if running native
  if (window.IS_NATIVE && window.nativeBridge) {
    wc.innerHTML = `<div style="color:var(--text-muted);font-size:12px;padding:8px">${t('loading')}</div>`;
    nativeBridge.call('listDir', { path: wpPickerCwd }).then(data => {
      if (data.error) { wc.innerHTML = `<div style="padding:20px;color:var(--red);font-size:12px">${data.error}</div>`; return; }
      wc.innerHTML = wpPickerHTML(wpPickerCwd, data.items || [], true);
    });
  } else {
    // Virtual FS mode
    const node = FS[wpPickerCwd] || FS['/'];
    const items = (node.children || []).map(name => {
      const cp = (wpPickerCwd === '/' ? '' : wpPickerCwd) + '/' + name;
      const ch = FS[cp] || {};
      return { name, isDir: ch.type === 'dir', path: cp };
    });
    wc.innerHTML = wpPickerHTML(wpPickerCwd, items, false);
  }
}

function wpPickerHTML(path, items, isNative) {
  const parts = (isNative ? path.replace('~', '').replace(/^\//, '') : path.replace(/^\//, '')).split('/').filter(Boolean);
  const root = isNative ? '~' : '/';

  // Breadcrumb
  let bc = `<div class="file-path" style="padding:2px 0 6px">
    <span class="fp-btn" onclick="wpPickerNav('${root}')">${isNative ? '~' : '~'}</span>`;
  for (let i = 0; i < parts.length; i++) {
    const sub = isNative ? '~/' + parts.slice(0, i + 1).join('/') : '/' + parts.slice(0, i + 1).join('/');
    bc += `<span style="opacity:.3">›</span><span class="fp-btn" onclick="wpPickerNav('${sub}')">${parts[i]}</span>`;
  }
  bc += '</div>';

  // Filter: show directories + image files only
  const filtered = items.filter(item => {
    if (item.isDir) return true;
    const ext = item.name.split('.').pop().toLowerCase();
    return IMG_EXTS.includes(ext);
  });

  // Back button
  let toolbar = '<div style="display:flex;gap:6px;margin-bottom:4px">';
  if (path !== root) {
    const parent = isNative
      ? (path.split('/').slice(0, -1).join('/') || '~')
      : ('/' + parts.slice(0, -1).join('/') || '/');
    toolbar += `<button class="files-btn" onclick="wpPickerNav('${parent}')" title="${t('back')}"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg> ${t('back')}</button>`;
  }
  // Quick jump to Pictures
  const picPath = isNative ? '~/Pictures' : '/Pictures';
  toolbar += `<button class="files-btn" onclick="wpPickerNav('${picPath}')">📷 Pictures</button>`;
  const dlPath = isNative ? '~/Downloads' : '/Downloads';
  toolbar += `<button class="files-btn" onclick="wpPickerNav('${dlPath}')">⬇ Downloads</button>`;
  // Import from device button
  toolbar += `<button class="files-btn" style="margin-left:auto" onclick="wpPickerImport()">${CFG.lang === 'ru' ? 'С устройства...' : 'From device...'}</button>`;
  toolbar += '</div>';

  if (filtered.length === 0) {
    return bc + toolbar + `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12px">${CFG.lang === 'ru' ? 'Нет изображений' : 'No images found'}</div>`;
  }

  const rows = filtered.map(item => {
    const fullPath = item.path || ((path === '/' ? '' : path) + '/' + item.name);
    const ext = item.name.split('.').pop().toLowerCase();
    const isImage = IMG_EXTS.includes(ext);

    if (item.isDir) {
      return `<div class="file-row" ondblclick="wpPickerNav('${fullPath}')">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="14" height="9" rx="1.5" fill="#2563eb"/><path d="M1 6.5V5.5C1 4.7 1.6 4 2.4 4H6.5L8 6.5H1Z" fill="#60a5fa"/></svg>
        <span class="file-name">${item.name}/</span>
      </div>`;
    }

    return `<div class="file-row" ondblclick="wpPickerSelect('${fullPath}')" style="cursor:pointer">
      <div style="width:26px;height:26px;border-radius:6px;background:#1e293b;display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="2" fill="#0e4429"/><path d="M3 10L5.5 6L7.5 9L9 7L11 10H3Z" fill="#34d399"/><circle cx="9.5" cy="4.5" r="1.5" fill="#fbbf24"/></svg>
      </div>
      <span class="file-name">${item.name}</span>
      <span class="file-meta">${item.size || ''}</span>
    </div>`;
  }).join('');

  return bc + toolbar + `<div style="flex:1;overflow-y:auto">${rows}</div>`;
}

function wpPickerNav(path) {
  wpPickerCwd = path;
  renderWpPicker();
}

function wpPickerSelect(path) {
  // In native mode, read the file as data and set as wallpaper
  if (window.IS_NATIVE && window.nativeBridge) {
    // For native: we can't directly read image as data URL from bridge easily,
    // so use the file:// URL path
    const realPath = path.replace('~', '');
    CFG.wallpaper = 'custom';
    CFG.wallpaperCustom = 'about:blank'; // placeholder
    CFG.wallpaperCustomName = path.split('/').pop();
    // Use nativeBridge to tell Swift to set wallpaper from path
    nativeBridge.fire('setWallpaperFromFile', { path: path });
    closeWin('wppicker');
  } else {
    // Virtual FS — files don't have real image data, just show the name
    CFG.wallpaper = 'custom';
    CFG.wallpaperCustom = null;
    CFG.wallpaperCustomName = path.split('/').pop();
    // Apply a gradient based on filename hash
    const hash = path.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const hue = hash % 360;
    document.getElementById('wallpaper').style.background = `linear-gradient(135deg, hsl(${hue},30%,8%), hsl(${(hue+40)%360},25%,12%), hsl(${hue},30%,6%))`;
    closeWin('wppicker');
  }
  // Refresh settings appearance page if open
  if (currentSettingsPage === 'appearance') {
    const wc = document.getElementById('settings-content');
    if (wc) renderSettingsPage(wc, 'appearance');
  }
}

function wpPickerImport() {
  // Trigger the hidden native file input as fallback
  document.getElementById('wallpaper-file-input').click();
  // Close picker after selecting
  setTimeout(() => { if (CFG.wallpaperCustom) closeWin('wppicker'); }, 500);
}

function checkForUpdate() {
  CFG.updateState = 'checking';
  const wc = document.getElementById('settings-content');
  if (wc) renderSettingsPage(wc, 'update');
  setTimeout(() => {
    CFG.updateState = 'available';
    if (currentSettingsPage === 'update') {
      const wc2 = document.getElementById('settings-content');
      if (wc2) renderSettingsPage(wc2, 'update');
    }
  }, 2000);
}

function installUpdate() {
  CFG.updateState = 'installing';
  const wc = document.getElementById('settings-content');
  if (wc) renderSettingsPage(wc, 'update');
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 15 + 3;
    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);
      setTimeout(() => {
        CFG.updateState = 'done';
        if (currentSettingsPage === 'update') {
          const wc2 = document.getElementById('settings-content');
          if (wc2) renderSettingsPage(wc2, 'update');
        }
      }, 500);
    }
    const fill = document.getElementById('update-fill');
    if (fill) fill.style.width = progress + '%';
  }, 200);
}

// After settings window opens, render initial page
const _origOpenWin = openWin;
// Handled inline: after openWin renders settingsHTML, we trigger page render
// We use MutationObserver or just setTimeout
function postSettingsRender() {
  setTimeout(() => {
    const wc = document.getElementById('settings-content');
    if (wc) renderSettingsPage(wc, currentSettingsPage);
  }, 10);
}


/* ─── 20. LAUNCHER ───────────────────────────────────────── */
function openLauncher() {
  launcherVisible = true; launcherSelection = 0;
  document.getElementById('launcher').classList.add('show');
  document.getElementById('launcher-input').value = '';
  filterLauncher('');
  setTimeout(() => document.getElementById('launcher-input').focus(), 30);
}
function closeLauncher() {
  launcherVisible = false;
  document.getElementById('launcher').classList.remove('show');
}
function filterLauncher(q) {
  const apps = getApps();
  const filtered = q ? apps.filter(a => t(a.nameKey).toLowerCase().includes(q.toLowerCase())) : apps;
  launcherFiltered = filtered; launcherSelection = 0;
  document.getElementById('launcher-results').innerHTML = filtered.map((a, i) =>
    `<div class="lr-item${i === 0 ? ' selected' : ''}" onclick="openWin('${a.id}');closeLauncher()">
      <div class="lr-icon" style="background:${a.bg}">${appIcon(a.id, 18)}</div>
      <span class="lr-name">${t(a.nameKey)}</span>
      <span class="lr-sub">${t(a.subKey)}</span>
    </div>`
  ).join('');
}
function launcherKey(e) {
  const els = document.querySelectorAll('.lr-item');
  if (e.key === 'ArrowDown') launcherSelection = Math.min(launcherSelection + 1, launcherFiltered.length - 1);
  else if (e.key === 'ArrowUp') launcherSelection = Math.max(launcherSelection - 1, 0);
  else if (e.key === 'Enter') { if (launcherFiltered[launcherSelection]) { openWin(launcherFiltered[launcherSelection].id); closeLauncher(); } return; }
  else return;
  els.forEach((el, i) => el.classList.toggle('selected', i === launcherSelection));
  e.preventDefault();
}


/* ─── 21. CONTEXT MENU ───────────────────────────────────── */
function showCtx(e) {
  e.preventDefault();
  const m = document.getElementById('ctx-menu');
  const r = document.getElementById('os').getBoundingClientRect();
  let x = e.clientX - r.left, y = e.clientY - r.top;
  if (x + 190 > r.width) x = r.width - 195;
  if (y + 160 > r.height) y = r.height - 165;
  m.style.left = x + 'px'; m.style.top = y + 'px';
  m.classList.add('show');
}
function closeCtx() { document.getElementById('ctx-menu').classList.remove('show'); }
function ctxAction(a) {
  closeCtx();
  if (a === 'launch') openLauncher();
  else if (a === 'settings') openWin('settings');
  else if (a === 'wall') {
    const walls = [
      ['deep-blue','linear-gradient(135deg,#0a1628,#162d50,#0a1628)'],
      ['forest','linear-gradient(135deg,#0a1a10,#0f2b18,#081a0c)'],
      ['midnight','linear-gradient(135deg,#0d0520,#1a0a35,#0d0520)'],
      ['aurora','linear-gradient(135deg,#0a1a20,#0d2030,#081520)'],
      ['nebula','linear-gradient(135deg,#140d1e,#1e1030,#0d081a)'],
    ];
    const pick = walls[Math.floor(Math.random() * walls.length)];
    setWallpaper(pick[0], pick[1]);
  }
  else if (a === 'new_folder') { openWin('files'); setTimeout(filesNewFolder, 200); }
  else if (a === 'new_file') { openWin('files'); setTimeout(filesNewFile, 200); }
}


/* ─── 22. GLOBAL EVENTS ─────────────────────────────────── */
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === ' ') { e.preventDefault(); launcherVisible ? closeLauncher() : openLauncher(); }
  if (e.key === 'Escape') { closeLauncher(); closeCtx(); closeAllMenus(); }
});

document.getElementById('os').addEventListener('mousedown', e => {
  if (launcherVisible && !e.target.closest('#launcher-box')) closeLauncher();
  if (!e.target.closest('#notif-panel') && !e.target.closest('#mb-notif-btn')) document.getElementById('notif-panel').classList.remove('show');
  if (!e.target.closest('#ctx-menu')) closeCtx();
  if (!e.target.closest('.mb-dropdown') && !e.target.closest('.mb-item') && !e.target.closest('.mb-logo')) closeAllMenus();
});

document.getElementById('mb-notif-btn').onclick = () => document.getElementById('notif-panel').classList.toggle('show');


/* ─── 23. CLOCK TICK ─────────────────────────────────────── */
function globalTick() {
  const n = new Date();
  document.getElementById('mb-clock').textContent = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  tickClock();
}


/* ─── 24. INITIALIZATION ─────────────────────────────────── */
function boot() {
  fsInit();
  buildMenus();
  buildDesktopIcons();
  buildDock();
  buildNotifPanel();
  buildCtxMenu();
  applyLang();
  globalTick();
  setInterval(globalTick, 1000);

  // Generate stars
  const wp = document.getElementById('wallpaper');
  for (let i = 0; i < 55; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const sz = Math.random() < 0.75 ? 1 : 1.5;
    star.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;top:${Math.random() * 100}%;opacity:${0.15 + Math.random() * 0.45}`;
    wp.appendChild(star);
  }

  // Override openWin to trigger settings page render
  const origRender = renderWinContent;
  renderWinContent = function(id, opts) {
    origRender(id, opts);
    if (id === 'settings') postSettingsRender();
  };
}

boot();

</script>

<!-- ============================================================
     NATIVE BRIDGE INTEGRATION
     When running inside Xcode WKWebView (window.IS_NATIVE = true),
     overrides virtual FS, fake metrics, and settings with real macOS data.
     When opened as standalone HTML, this entire block is skipped.
     ============================================================ -->
<script>
(function() {
  // Wait for native bridge to be injected
  function waitForNative(cb) {
    if (window.IS_NATIVE && window.nativeBridge) { cb(); return; }
    var attempts = 0;
    var check = setInterval(function() {
      if (window.IS_NATIVE && window.nativeBridge) { clearInterval(check); cb(); }
      if (++attempts > 50) clearInterval(check); // give up after 5s
    }, 100);
  }

  waitForNative(function() {
    console.log('[KonturOS] Native bridge detected — activating real macOS integration');

    // ══════════════════════════════════════════════════════════
    // 1. BATTERY — update menubar battery from macOS
    // ══════════════════════════════════════════════════════════
    window.onNativeBattery = function(bat) {
      var fill = document.getElementById('mb-battery-fill');
      var pct = document.getElementById('mb-battery-pct');
      if (!fill || !pct) return;
      if (!bat.hasBattery) {
        document.getElementById('mb-battery').style.display = 'none';
        return;
      }
      document.getElementById('mb-battery').style.display = 'flex';
      var level = Math.max(0, Math.min(100, bat.level));
      var w = Math.round(level / 100 * 11); // max fill width = 11
      fill.setAttribute('width', String(w));
      var color = level < 20 ? '#f87171' : level < 50 ? '#fbbf24' : 'rgba(255,255,255,0.35)';
      if (bat.charging) color = '#4ade80';
      fill.setAttribute('fill', color);
      pct.textContent = level + '%';
      pct.style.color = color;
    };

    // ══════════════════════════════════════════════════════════
    // 2. FILESYSTEM — override to use real macOS files
    // ══════════════════════════════════════════════════════════
    var nativeFsCwd = '~';

    // Override the FS initialization (no-op for native)
    window.fsInit = function() {};

    // Override fsNav to use native bridge
    window.fsNav = function(path) {
      nativeFsCwd = path || '~';
      selectedFile = null;
      nativeRefreshFiles(false);
    };

    function nativeRefreshFiles(keepScroll) {
      var wc = document.getElementById('wc_files');
      if (!wc) return;
      var scrollPos = keepScroll ? wc.scrollTop : 0;
      wc.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px">' + t('loading') + '</div>';
      nativeBridge.call('listDir', { path: nativeFsCwd }).then(function(data) {
        if (data.error) { wc.innerHTML = '<div style="padding:20px;color:var(--red);font-size:12px">' + data.error + '</div>'; return; }
        wc.innerHTML = nativeFilesHTML(nativeFsCwd, data);
        if (keepScroll) requestAnimationFrame(function() { wc.scrollTop = scrollPos; });
      });
    }
    window.refreshFiles = nativeRefreshFiles;

    function nativeFilesHTML(path, data) {
      var parts = path.replace(/^~\/?/, '').split('/').filter(Boolean);
      var bc = '<div class="file-path"><span class="fp-btn" onclick="fsNav(\'~\')">~</span>';
      for (var i = 0; i < parts.length; i++) {
        var sub = '~/' + parts.slice(0, i + 1).join('/');
        bc += '<span style="opacity:.3">›</span><span class="fp-btn" onclick="fsNav(\'' + sub + '\')">' + parts[i] + '</span>';
      }
      bc += '</div>';

      var toolbar = '<div class="files-toolbar">';
      if (path !== '~') toolbar += '<button class="files-btn" onclick="fsNav(\'' + parentPath(path) + '\')" title="' + t('back') + '"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6L8 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></button>';
      toolbar += '<button class="files-btn" onclick="nativeNewFolder()">+ ' + t('files_new_folder') + '</button>';
      toolbar += '<button class="files-btn" onclick="nativeNewFile()">+ ' + t('files_new_file') + '</button>';
      if (selectedFile) {
        toolbar += '<button class="files-btn" onclick="fsCopy()">' + t('copy_file') + '</button>';
        toolbar += '<button class="files-btn" onclick="fsCut()">' + t('cut_file') + '</button>';
        toolbar += '<button class="files-btn" onclick="filesRename()">' + t('files_rename') + '</button>';
        toolbar += '<button class="files-btn" style="color:var(--red)" onclick="filesDelete()">' + t('files_delete') + '</button>';
      }
      if (fsClipboard.path) toolbar += '<button class="files-btn" style="color:var(--accent)" onclick="fsPaste()">' + t('paste_file') + '</button>';
      toolbar += '<button class="files-btn" style="margin-left:auto" onclick="nativeOpenInFinder()">' + t('open_in_finder') + '</button>';
      toolbar += '</div>';

      if (!data.items || data.items.length === 0) {
        return bc + toolbar + '<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:12px">' + t('empty_folder') + '</div>';
      }

      var rows = data.items.map(function(item) {
        var fullPath = (path === '~' ? '~' : path) + '/' + item.name;
        var sel = selectedFile === fullPath ? ' selected' : '';
        var icon = item.isDir
          ? '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="5" width="14" height="9" rx="1.5" fill="#2563eb"/><path d="M1 6.5V5.5C1 4.7 1.6 4 2.4 4H6.5L8 6.5H1Z" fill="#60a5fa"/></svg>'
          : getFileIcon(item.name);
        var onclick = item.isDir
          ? 'fsNav(\'' + fullPath + '\')'
          : 'nativeOpenFile(\'' + fullPath + '\')';
        return '<div class="file-row' + sel + '" onclick="selectFile(\'' + fullPath + '\')" ondblclick="' + onclick + '">' +
          '<div style="width:26px;height:26px;border-radius:6px;background:' + (item.isDir ? '#112244' : '#1e293b') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">' + icon + '</div>' +
          '<span class="file-name">' + item.name + (item.isDir ? '/' : '') + '</span>' +
          '<span class="file-meta">' + (item.isDir ? t('folder') : (item.size || '')) + '</span></div>';
      }).join('');

      return bc + toolbar + '<div>' + rows + '</div>';
    }

    function parentPath(p) {
      if (p === '~' || p === '~/') return '~';
      var parts = p.split('/');
      parts.pop();
      return parts.join('/') || '~';
    }

    window.nativeOpenFile = function(path) {
      nativeBridge.call('readFile', { path: path }).then(function(data) {
        if (data.error || data.binary) return;
        openWin('editor', { path: path, content: data.content || '' });
      });
    };

    // Override editor save to write to real filesystem
    var origEditorSave = window.editorSave;
    window.editorSave = function() {
      var ta = document.getElementById('editor-textarea');
      if (!ta || !editorCurrentPath) return;
      if (window.IS_NATIVE) {
        nativeBridge.call('writeFile', { path: editorCurrentPath, content: ta.value }).then(function(res) {
          var status = document.getElementById('editor-status');
          if (status) {
            status.textContent = res.error ? '✗ ' + res.error : '✓ ' + t('editor_saved');
            status.style.color = res.error ? 'var(--red)' : 'var(--green)';
            status.style.opacity = '1';
            setTimeout(function() { status.style.opacity = '0'; }, 2000);
          }
        });
      } else if (origEditorSave) {
        origEditorSave();
      }
    };

    window.nativeNewFolder = async function() {
      var res = await showDialog({ title: t('files_new_folder'), input: true, buttons: [{ label: t('cancel') }, { label: t('create'), cls: 'primary' }] });
      if (res && res.btn === 1 && res.value && res.value.trim()) {
        var newPath = nativeFsCwd + '/' + res.value.trim();
        await nativeBridge.call('createDir', { path: newPath });
        nativeRefreshFiles();
      }
    };

    window.nativeNewFile = async function() {
      var res = await showDialog({ title: t('files_new_file'), input: true, inputValue: 'untitled.txt', buttons: [{ label: t('cancel') }, { label: t('create'), cls: 'primary' }] });
      if (res && res.btn === 1 && res.value && res.value.trim()) {
        var newPath = nativeFsCwd + '/' + res.value.trim();
        await nativeBridge.call('createFile', { path: newPath, content: '' });
        nativeRefreshFiles();
      }
    };

    window.nativeOpenInFinder = function() {
      nativeBridge.fire('openInFinder', { path: nativeFsCwd });
    };

    // Override selectFile for native
    window.selectFile = function(path) {
      selectedFile = selectedFile === path ? null : path;
      nativeRefreshFiles(true);
    };

    // Override delete/rename for native
    window.filesDelete = async function() {
      if (!selectedFile) return;
      var name = selectedFile.split('/').pop();
      var res = await showDialog({ title: t('files_delete'), text: t('delete_confirm') + '<br><b>' + name + '</b>', buttons: [{ label: t('cancel') }, { label: t('delete_btn'), cls: 'danger' }] });
      if (res && res.btn === 1) {
        await nativeBridge.call('deleteItem', { path: selectedFile });
        selectedFile = null;
        nativeRefreshFiles();
      }
    };

    window.filesRename = async function() {
      if (!selectedFile) return;
      var oldName = selectedFile.split('/').pop();
      var res = await showDialog({ title: t('rename_title'), input: true, inputValue: oldName, buttons: [{ label: t('cancel') }, { label: t('ok'), cls: 'primary' }] });
      if (res && res.btn === 1 && res.value && res.value.trim()) {
        var newPath = parentPath(selectedFile) + '/' + res.value.trim();
        await nativeBridge.call('renameItem', { from: selectedFile, to: newPath });
        selectedFile = null;
        nativeRefreshFiles();
      }
    };


    // File clipboard operations
    window.fsCopy = function() {
      if (!selectedFile) return;
      fsClipboard = { path: selectedFile, op: 'copy' };
      nativeRefreshFiles(true);
    };
    window.fsCut = function() {
      if (!selectedFile) return;
      fsClipboard = { path: selectedFile, op: 'cut' };
      nativeRefreshFiles(true);
    };
    window.fsPaste = async function() {
      if (!fsClipboard.path) return;
      var srcName = fsClipboard.path.split('/').pop();
      var destPath = nativeFsCwd + '/' + srcName;
      if (fsClipboard.op === 'copy') {
        // Read then write for copy
        var data = await nativeBridge.call('readFile', { path: fsClipboard.path });
        if (data && !data.error && !data.binary) {
          await nativeBridge.call('createFile', { path: destPath, content: data.content || '' });
        }
      } else if (fsClipboard.op === 'cut') {
        await nativeBridge.call('renameItem', { from: fsClipboard.path, to: destPath });
        fsClipboard = { path: null, op: null };
      }
      selectedFile = null;
      nativeRefreshFiles(false);
    };

    // Override menu actions
    window.menuNewFolder = window.nativeNewFolder;
    window.menuNewFile = window.nativeNewFile;

    // Override renderWinContent for files to use native
    var origRenderWin = window.renderWinContent;
    window.renderWinContent = function(id, opts) {
      if (id === 'files') {
        var wc = document.getElementById('wc_files');
        if (wc) { nativeRefreshFiles(); }
        return;
      }
      origRenderWin(id, opts);
      if (id === 'settings') postSettingsRender();
    };

    // ══════════════════════════════════════════════════════════
    // 3. SYSTEM MONITOR — real macOS metrics
    // ══════════════════════════════════════════════════════════
    window.onNativeMetrics = function(data) {
      if (!data) return;

      // Update system monitor cards if window is open
      var cpu = data.cpu || {};
      var mem = data.mem || {};
      var bat = data.battery || {};

      var cpuPct = Math.round(cpu.usage || 0);
      var memUsed = mem.usedMB || 0;
      var memTotal = mem.totalMB || 1;
      var memPct = Math.round(mem.percent || 0);

      // Update cards
      var updCard = function(id, val, pct, color, sub) {
        var el = document.getElementById(id);
        if (!el) return;
        var v = el.querySelector('.smon-val'); if (v) v.textContent = val;
        var s = el.querySelector('.smon-sub'); if (s) s.textContent = sub;
        var f = el.querySelector('.smon-bar-fill');
        if (f) { f.style.width = pct + '%'; f.style.background = color; }
      };

      var cpuColor = cpuPct > 70 ? 'var(--red)' : cpuPct > 40 ? 'var(--yellow)' : 'var(--green)';
      updCard('scpu', cpuPct + '%', cpuPct, cpuColor, (cpu.cores || 0) + ' ' + t('cores_label'));
      updCard('smem', memUsed + ' MB', memPct, 'var(--accent)', t('of_total') + ' ' + memTotal + ' MB');

      // Temperature — use battery temp or estimate
      var temp = data.temperature || (42 + Math.random() * 20);
      updCard('stemp', Math.round(temp) + '°C', Math.min(100, temp * 1.3),
        temp > 70 ? 'var(--red)' : temp > 55 ? 'var(--yellow)' : 'var(--purple)', t('normal_temp'));

      var sys = data.system || {};
      var upSec = sys.uptimeSec || Math.floor(performance.now() / 1000);
      updCard('supt', Math.floor(upSec / 3600) + 'h ' + Math.floor((upSec % 3600) / 60) + 'm', 30, 'var(--yellow)', sys.platform || '');

      // Update graphs
      cpuH.push(cpuPct); memH.push(memPct);
      if (cpuH.length > 28) cpuH.shift();
      if (memH.length > 28) memH.shift();
      drawGraph('gcpu', cpuH, '#34d399');
      drawGraph('gmem', memH, '#3b82f6');

      // Update battery in menubar
      if (bat.hasBattery && window.onNativeBattery) {
        window.onNativeBattery(bat);
      }
    };

    // Override sysmon open to start native metrics stream
    var origOpenWin = window.openWin;
    window.openWin = function(id, opts) {
      origOpenWin(id, opts);
      if (id === 'sysmon') {
        // Stop fake timers, start real metrics
        var w = openWindows['sysmon'];
        if (w && w._t) { clearInterval(w._t); w._t = null; }
        if (w && w._ai) { clearInterval(w._ai); w._ai = null; }
        nativeBridge.fire('startMetrics');
        // Also do initial AI analysis with real data
        nativeBridge.call('getSystemMetrics').then(function(d) {
          window.onNativeMetrics(d);
          fetchAI({
            cpu: Math.round(d.cpu.usage || 0),
            mem: d.mem.usedMB || 0,
            memTotal: d.mem.totalMB || 0,
            temp: 50,
            cores: d.cpu.cores || 0
          });
        });
      }
    };

    var origCloseWin = window.closeWin;
    window.closeWin = function(id) {
      if (id === 'sysmon') nativeBridge.fire('stopMetrics');
      origCloseWin(id);
    };

    // ══════════════════════════════════════════════════════════
    // 4. SETTINGS — call real macOS APIs
    // ══════════════════════════════════════════════════════════
    // Load real settings state on settings open
    var origSwitchSettings = window.switchSettingsPage;
    window.switchSettingsPage = function(page) {
      origSwitchSettings(page);
      if (['display', 'sound', 'network'].includes(page)) {
        nativeBridge.call('getSettingsState').then(function(state) {
          // Update CFG with real values
          if (state.volume !== undefined) CFG.vol = state.volume;
          if (state.brightness !== undefined) CFG.bright = state.brightness;
          if (state.darkMode !== undefined) CFG.darkMode = state.darkMode;
          // Re-render the page with real values
          var wc = document.getElementById('settings-content');
          if (wc) renderSettingsPage(wc, page);
          // Patch sliders to call native
          patchSettingsSliders();
        });
      }
    };

    function patchSettingsSliders() {
      // Find volume slider and patch oninput
      document.querySelectorAll('.s-slider-row input[type=range]').forEach(function(slider) {
        var origOninput = slider.oninput;
        slider.addEventListener('change', function() {
          var val = parseInt(slider.value);
          // Determine which slider this is by checking nearby labels
          var parent = slider.closest('.s-slider-row') || slider.parentElement;
          var label = parent.previousElementSibling;
          var labelText = label ? label.textContent.toLowerCase() : '';
          if (labelText.includes(t('volume').toLowerCase()) || labelText.includes('volume')) {
            nativeBridge.fire('setVolume', { value: val / 100 });
          } else if (labelText.includes(t('brightness').toLowerCase()) || labelText.includes('brightness')) {
            nativeBridge.fire('setBrightness', { value: val / 100 });
          }
        });
      });
    }

    // Override toggleCfg for native settings
    var origToggleCfg = window.toggleCfg;
    window.toggleCfg = function(key, row) {
      origToggleCfg(key, row);
      // Send to native
      if (key === 'darkMode') nativeBridge.fire('setDarkMode', { value: CFG.darkMode });
    };

    // ══════════════════════════════════════════════════════════
    // 5. SYSTEM INFO — override About page with real data
    // ══════════════════════════════════════════════════════════
    var origRenderSettingsPage = window.renderSettingsPage;
    window.renderSettingsPage = function(container, page) {
      origRenderSettingsPage(container, page);
      if (page === 'about' || page === 'storage' || page === 'network') {
        // Fetch real data and update
        nativeBridge.call('getSystemMetrics').then(function(data) {
          var sys = data.system || {};
          if (page === 'about') {
            // Replace the about info with real data
            var rows = container.querySelectorAll('.s-row');
            rows.forEach(function(row) {
              var label = row.querySelector('.s-label');
              var val = row.querySelector('.s-value');
              if (!label || !val) return;
              var lt = label.textContent;
              if (lt === t('kernel')) val.textContent = 'Darwin ' + sys.os;
              if (lt === t('platform')) val.textContent = sys.arch || sys.platform;
              if (lt === t('cores')) val.textContent = sys.cores + ' (' + (sys.cpuName || '').substring(0, 40) + ')';
              if (lt === t('memory')) val.textContent = Math.round(sys.ramMB / 1024) + ' GB';
              if (lt === t('uptime_label')) {
                var u = sys.uptimeSec || 0;
                val.textContent = Math.floor(u/3600) + 'h ' + Math.floor((u%3600)/60) + 'm';
              }
            });
          }
          if (page === 'storage' && data.disk) {
            // Update storage with real disk data
            var totalEl = container.querySelector('.s-row .s-value');
            if (totalEl) totalEl.textContent = Math.round(data.disk.totalGB) + ' GB';
          }
        });
        if (page === 'network') {
          nativeBridge.call('getSettingsState').then(function(state) {
            var rows = container.querySelectorAll('.s-row');
            rows.forEach(function(row) {
              var label = row.querySelector('.s-label');
              var val = row.querySelector('.s-value');
              if (!label || !val) return;
              var lt = label.textContent;
              if (lt === t('wifi') && state.wifi) val.textContent = state.wifi.connected ? (state.wifi.ssid || t('wifi_on')) : t('wifi_off');
              if (lt === t('ip_address')) val.textContent = state.ip || 'unknown';
              if (lt === t('hostname')) val.textContent = state.hostname || 'unknown';
              if (lt === t('mac_address') && state.wifi) val.textContent = state.wifi.macAddress || 'unknown';
            });
          });
        }
      }
    };

    // ══════════════════════════════════════════════════════════
    // 6. TERMINAL — override pwd/ls with real FS
    // ══════════════════════════════════════════════════════════
    // Terminal already works standalone; native FS commands can
    // be extended later. For now, terminal uses its virtual FS.
    // (Terminal is a sandboxed emulator, not a real shell.)

    console.log('[KonturOS] Native bridge integration complete');
  });
})();
</script>
</body>
</html>
