<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>LumaOS Application</title>
</head>
<body>
    <header class="taskbar">
        <div class="icon">LumaOS</div>
        <div class="settings-icon">⚙️</div>
    </header>
    <div class="desktop">
        <div class="notification">Welcome to LumaOS!</div>
        <div class="dock">
            <div class="dock-icon">📂 Files</div>
            <div class="dock-icon">🌐 Browser</div>
            <div class="dock-icon">⚙️ Settings</div>
        </div>
    </div>
    <div class="window-system">
        <div class="window">
            <div class="window-header">Application Window</div>
            <div class="window-content">This is a built-in application.</div>
        </div>
    </div>
</body>
</html>
